  }
  .stratagems {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: center;
  }
  .stratagem {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    width: 220px;
    text-align: center;
    box-shadow: 0 0 12px #00ff99aa;
    transition: transform 0.2s ease;
  }

  /* .stratagem, .stratagem .card-back {
    background: #222;

   */
  .rare, .rare .card-back {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
    box-shadow:
      0 0 8px 2px #ff0000,    /* red */
      0 0 12px 4px #ff7f00,   /* orange */
      0 0 16px 6px #ffff00,   /* yellow */
      0 0 20px 8px #00ff00,   /* green */
      0 0 24px 10px #0000ff,  /* blue */
      0 0 28px 12px #4b0082,  /* indigo */
      0 0 32px 14px #8b00ff;  /* violet */
    transition: transform 0.2s ease;
  }

  .rare .card-front {
    box-shadow:
      0 0 4px 1px #ff0000,    /* red */
      0 0 6px 2px #ff7f00,   /* orange */
      0 0 8px 3px #ffff00,   /* yellow */
      0 0 10px 4px #00ff00,   /* green */
      0 0 12px 5px #0000ff,  /* blue */
      0 0 14px 6px #4b0082,  /* indigo */
      0 0 16px 7px #8b00ff;  /* violet */
  }

  .weak, .weak .card-back {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
    box-shadow: 0 0 8px gray;
    transition: transform 0.2s ease;
  }

  .weak .card-front {
    box-shadow: 0 0 8px gray;
  }

  .stratagem:hover {
    transform: scale(1.05);
  }
  .stratagem img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 1rem;
  }
  .name {
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
  }
  .category {
    font-style: italic;
    color: #66ffcc;
  }

  #randomBtn, #randomBtn2, #randomBtn3 {
    background: linear-gradient(to right, #ff0080, #7928ca);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    margin: 1rem auto;
    margin-top: 50px;
    display: block;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 12px #ff00ff99;
  }

  #randomBtn2 {
    margin-top: 10px;
  }

  #randomBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff00ffcc;
  }


.card-grid {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1rem;
  max-width: 1200px;
  margin: auto;
}

.card {
  width: 220px;
  height: 165px;
  perspective: 1000px;
  margin: 8px 8px 8px 8px;
  cursor: pointer;
  opacity: 1;
  transform: translateY(20px);
  transition: all 0.4s ease;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
}

.card-front {
  background: #111;
  box-shadow: 0 0 16px #0ff;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0ff;
  font-size: 1.2rem;
}

.card-back {
  transform: rotateY(180deg);
  background: #222;
  box-shadow: 0 0 24px 6px #00ffcc;
  text-align: center;
  padding: 1rem;
}

.card-back img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  margin-bottom: 0.5rem;
}

.card-back .name {
  font-weight: bold;
  margin-top: 0.5rem;
  color: #fff;
}

.card-back .category {
  font-size: 0.9rem;
  color: #aaa;
}

.disabled {
  z-index: -1;
  opacity: 0.3
}

.disabled .card-back, .disabled .card-front {

}

.free-rarity-scan {
 text-align: center;
}

/* ── Draft Mode ── */
#randomBtnDraft {
  background: linear-gradient(to right, #ff6600, #ff0080);
  color: white;
  border: none;
  padding: 0.75rem 1.5rem;
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
  margin: 10px auto;
  display: block;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px #ff660099;
}
#randomBtnDraft:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff6600cc;
}

.draft-section {
  max-width: 1000px;
  margin: 1rem auto;
}

.draft-loadout {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.75rem;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  background: #1a1a1a;
  border: 2px solid #333;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, opacity 0.4s;
}
.draft-loadout:hover {
  border-color: #ff00ff88;
  background: #222;
}
.draft-loadout.selected {
  border-color: #00ffcc;
  background: #0a2020;
  cursor: default;
}
.draft-loadout.faded {
  opacity: 0.2;
  pointer-events: none;
}

.draft-loadout-label {
  min-width: 72px;
  font-weight: bold;
  color: #888;
  font-size: 0.85rem;
  text-align: center;
}

.draft-cards {
  display: flex;
  gap: 0.5rem;
  flex: 1;
  justify-content: center;
}

.draft-card {
  width: 160px;
  height: 140px;
  perspective: 1000px;
  margin: 0;
}
.draft-card .card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}
.draft-card.flipped .card-inner {
  transform: rotateY(180deg);
}
.draft-card .card-front {
  flex-direction: column;
  gap: 0.35rem;
}
.draft-card .card-back {
  padding: 0.5rem;
}
.draft-card .card-back img {
  width: 55px;
  height: 55px;
  margin-bottom: 0.3rem;
}
.draft-card .card-back .name {
  font-size: 0.8rem;
}
.draft-card .card-back .category {
  font-size: 0.7rem;
}

.draft-type-emoji { font-size: 1.6rem; line-height: 1; }
.draft-type-label { font-size: 0.72rem; font-weight: bold; text-align: center; padding: 0 0.25rem; }

/* Type-coloured fronts */
.draft-card .card-front.type-support   { background: #10102a; box-shadow: 0 0 14px #4488ffbb; color: #88aaff; }
.draft-card .card-front.type-backpack  { background: #0a1a2a; box-shadow: 0 0 14px #00aaffbb; color: #44ccff; }
.draft-card .card-front.type-defensive { background: #0a2a0a; box-shadow: 0 0 14px #44cc44bb; color: #88ee88; }
.draft-card .card-front.type-strike    { background: #2a1010; box-shadow: 0 0 14px #ff4444bb; color: #ff8888; }

.draft-card.rerollable:hover .card-back {
  box-shadow: 0 0 28px 8px #ffaa00cc;
  cursor: pointer;
}
.draft-card.rerollable .card-back::after {
  content: "🔄 re-roll";
  position: absolute;
  bottom: 4px;
  left: 0; right: 0;
  text-align: center;
  font-size: 0.62rem;
  color: #ffaa00cc;
  opacity: 0;
  transition: opacity 0.2s;
}
.draft-card.rerollable:hover .card-back::after {
  opacity: 1;
}

var selectedCount = 0
var allCardDivs = []
var scanCount = 1
var scanCountEl = document.getElementById("scan-count")

// Pick 4 unique random stratagems
function pickRandomStratagems(arr, count) {
  const result = [];
  const usedIndices = new Set();
  while (result.length < count && result.length < arr.length) {
    const i = Math.floor(Math.random() * arr.length);
    if (!usedIndices.has(i)) {
      usedIndices.add(i);
      result.push(arr[i]);
    }
  }

  const backpackCount = result.filter(_s => _s.isBackpack).length
  const supplyWeaponCount = result.filter(_s => _s.category === "Supply" && !_s.isBackpack && !_s.isVehicle).length

  // Prevent backpack + supply weapon more than 2
  if ((count <= 4) && backpackCount + supplyWeaponCount > 2) {
    return pickRandomStratagems(arr, count)
  }

  if ((count > 4) && (backpackCount > 2 || supplyWeaponCount > 2)) {
    return pickRandomStratagems(arr, count)
  }

  return result;
}

function randomBoosters(arr, count) {
  const result = [];
  const usedIndices = new Set();
  while (result.length < count && result.length < arr.length) {
    const i = Math.floor(Math.random() * arr.length);
    if (!usedIndices.has(i)) {
      usedIndices.add(i);
      result.push(arr[i]);
    }
  }

  return result;
}

function displayStratagems(count = 4, hideRarity = false) {
  const container = document.getElementById("stratagems");
  container.innerHTML = "";
  selectedCount = 0
  allCardDivs = []
  scanCount = count > 4 ? 1 : 0
  scanCountEl.innerHTML = scanCount

  const chosen = pickRandomStratagems(stratagems, count);

  chosen.forEach(s => {
    let div = document.createElement("div");
    allCardDivs.push(div)
  
    if (hideRarity) 
      div.className = "stratagem weak card"
    else if (rareStratagems.includes(s.name))
      div.className = "stratagem rare card"
    else if (weakStratagems.includes(s.name))
      div.className = "stratagem weak card"
    else 
      div.className = "stratagem card"

    div.innerHTML = `
      <div class="card-inner">
        <div class="card-front">Click to Reveal</div>
        <div class="card-back">
          <img src="${s.icon}" alt="${s.name} Icon" />
          <div class="name">${s.name}</div>
          <div class="category">${s.category}</div>
        </div>
      </div>
    `;

    // Flip on click
    div.addEventListener("click", () => {
      scanCount--

      if (scanCount >= 0) {
        scanCountEl.innerHTML = scanCount

        div.classList.remove("weak")
        if (rareStratagems.includes(s.name))
          div.classList.add("rare")
        else if (weakStratagems.includes(s.name))
          div.classList.add("weak")
      }

      if (scanCount >= 0) {
        return false
      }

      if (div.classList.contains("flipped"))
        return false

      div.classList.add("flipped");
      selectedCount++

      div.classList.remove("weak")
      if (rareStratagems.includes(s.name))
        div.classList.add("rare")
      else if (weakStratagems.includes(s.name))
        div.classList.add("weak")

      if (selectedCount === 4 && hideRarity) {
        allCardDivs.forEach(_div => {
          if (!_div.classList.contains("flipped")) {
            _div.classList.add("flipped")
            _div.classList.add("disabled")
            _div.classList.add("weak")
          }
        })
      }
    });

    container.appendChild(div);
  });
}

function displayBoosters() {
  const container = document.getElementById("boosters");
  container.innerHTML = "";
  allCardDivs = []

  const chosen = randomBoosters(boosters, 4);

  chosen.forEach(s => {

    div.innerHTML = `

          <div class="name">${s.name}</div>
          <div class="category">${s.name}</div>

    `;

    // Flip on click
    div.addEventListener("click", () => {
      if (div.classList.contains("flipped"))
        return false

      div.classList.add("flipped");
    });

    container.appendChild(div);
  });
}

function getCardType(s) {
  if (s.isVehicle || s.isBackpack)                                                  return { label: "Backpack / Exosuit",   emoji: "🎒", cls: "type-backpack"  };
  if (s.category === "Offensive – Eagle" || s.category === "Offensive – Orbital")  return { label: "Strike",               emoji: "☄️", cls: "type-strike"   };
  if (s.category === "Defensive")                                                   return { label: "Sentry / Emplacement", emoji: "🗼", cls: "type-defensive" };
  return                                                                                   { label: "Support Weapon",       emoji: "🔫", cls: "type-support"  };
}

function pickDraftLoadout(arr) {
  const result = [];
  const usedIndices = new Set();
  while (result.length < 4 && result.length < arr.length) {
    const i = Math.floor(Math.random() * arr.length);
    if (usedIndices.has(i)) continue;
    const s = arr[i];
    const isSupport = s.category === "Supply" && !s.isBackpack && !s.isVehicle;
    if (isSupport && Math.random() < 0.2) continue; // 20% chance to skip support weapons
    usedIndices.add(i);
    result.push(s);
  }
  const backpackCount = result.filter(s => s.isBackpack).length;
  const supportCount  = result.filter(s => s.category === "Supply" && !s.isBackpack && !s.isVehicle).length;
  if (backpackCount > 1 || supportCount > 2) return pickDraftLoadout(arr);
  return result;
}

function getSameTypePool(s) {
  const cls = getCardType(s).cls;
  return stratagems.filter(x => getCardType(x).cls === cls);
}

function buildDraftCardHTML(s) {
  const type = getCardType(s);
  return `
    <div class="card-inner">
      <div class="card-front ${type.cls}">
        <div class="draft-type-emoji">${type.emoji}</div>
        <div class="draft-type-label">${type.label}</div>
      </div>
      <div class="card-back">
        <img src="${s.icon}" alt="${s.name}" />
        <div class="name">${s.name}</div>
        <div class="category">${s.category}</div>
      </div>
    </div>
  `;
}

function displayDraftMode() {
  const section = document.getElementById("draft-section");
  section.innerHTML = "";
  let picked = false;

  // Build all loadouts first so click handlers can reference each other
  const all = Array.from({ length: 3 }, (_, li) => {
    const loadout = pickDraftLoadout(stratagems);

    const loadoutDiv = document.createElement("div");
    loadoutDiv.className = "draft-loadout";

    const label = document.createElement("div");
    label.className = "draft-loadout-label";
    label.textContent = `Loadout ${li + 1}`;
    loadoutDiv.appendChild(label);

    const cardsDiv = document.createElement("div");
    cardsDiv.className = "draft-cards";

    const cardDivs = [];
    loadout.forEach(s => {
      const cardDiv = document.createElement("div");
      cardDiv.className = "draft-card card";
      cardDiv.innerHTML = buildDraftCardHTML(s);
      cardDivs.push(cardDiv);
      cardsDiv.appendChild(cardDiv);
    });

    loadoutDiv.appendChild(cardsDiv);
    section.appendChild(loadoutDiv);
    return { loadoutDiv, cardDivs, loadout };
  });

  // Wire up click handlers now that all loadouts exist
  all.forEach(({ loadoutDiv, cardDivs, loadout }, li) => {
    loadoutDiv.addEventListener("click", () => {
      if (picked) return;
      picked = true;

      // Reveal selected loadout
      cardDivs.forEach(c => c.classList.add("flipped"));
      loadoutDiv.classList.add("selected");

      // Reveal AND fade the others
      all.forEach((other, j) => {
        if (j !== li) {
          other.cardDivs.forEach(c => c.classList.add("flipped"));
          other.loadoutDiv.classList.add("faded");
        }
      });

      // After flip animation, enable per-card re-roll on the selected loadout
      setTimeout(() => {
        cardDivs.forEach((cardDiv, idx) => {
          cardDiv.classList.add("rerollable");
          cardDiv.addEventListener("click", (e) => {
            e.stopPropagation();
            if (cardDiv.dataset.animating === "true") return;

            const pool = getSameTypePool(loadout[idx]).filter(x => !loadout.includes(x));
            if (pool.length === 0) return;

            const newS = pool[Math.floor(Math.random() * pool.length)];
            loadout[idx] = newS;
            cardDiv.dataset.animating = "true";
            cardDiv.classList.remove("flipped");

            setTimeout(() => {
              cardDiv.innerHTML = buildDraftCardHTML(newS);
              setTimeout(() => {
                cardDiv.classList.add("flipped");
                setTimeout(() => { cardDiv.dataset.animating = "false"; }, 650);
              }, 50);
            }, 650);
          });
        });
      }, 700);
    });
  });
}
