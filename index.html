<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="referrer" content="no-referrer" />
<title>Random Helldivers Stratagems</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #121212;
    color: #eee;
  }
  h1 {
    text-align: center;
    margin: 0;
  }
  .stratagems {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: center;
  }
  .stratagem {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    width: 220px;
    text-align: center;
    box-shadow: 0 0 12px #00ff99aa;
    transition: transform 0.2s ease;
  }

  /* .stratagem, .stratagem .card-back {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    width: 220px;
    text-align: center;
    box-shadow: 0 0 8px #00ff99aa;
    transition: transform 0.2s ease;
  }
   */
  .rare, .rare .card-back {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
    box-shadow:
      0 0 8px 2px #ff0000,    /* red */
      0 0 12px 4px #ff7f00,   /* orange */
      0 0 16px 6px #ffff00,   /* yellow */
      0 0 20px 8px #00ff00,   /* green */
      0 0 24px 10px #0000ff,  /* blue */
      0 0 28px 12px #4b0082,  /* indigo */
      0 0 32px 14px #8b00ff;  /* violet */
    transition: transform 0.2s ease;
  }

  .rare .card-front {
    box-shadow:
      0 0 4px 1px #ff0000,    /* red */
      0 0 6px 2px #ff7f00,   /* orange */
      0 0 8px 3px #ffff00,   /* yellow */
      0 0 10px 4px #00ff00,   /* green */
      0 0 12px 5px #0000ff,  /* blue */
      0 0 14px 6px #4b0082,  /* indigo */
      0 0 16px 7px #8b00ff;  /* violet */
  }

  .weak, .weak .card-back {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
    box-shadow: 0 0 8px gray;
    transition: transform 0.2s ease;
  }

  .weak .card-front {
    box-shadow: 0 0 8px gray;
  }

  .stratagem:hover {
    transform: scale(1.05);
  }
  .stratagem img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 1rem;
  }
  .name {
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
  }
  .category {
    font-style: italic;
    color: #66ffcc;
  }

/* ── Action Menu ── */
#action-menu {
  display: flex;
  align-items: stretch;
  background: #0a0a0a;
  border: 1px solid #1e1e1e;
  border-radius: 14px;
  padding: 1rem 1.5rem;
  margin: 0 auto 2rem auto;
  max-width: 860px;
  gap: 0;
  flex-wrap: wrap;
}

.menu-group {
  flex: 1;
  min-width: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  padding: 0.25rem 1rem;
}

.menu-group-label {
  font-size: 0.6rem;
  letter-spacing: 4px;
  color: #444;
  font-weight: bold;
  text-transform: uppercase;
  padding-bottom: 0.25rem;
  border-bottom: 1px solid #1a1a1a;
  width: 100%;
  text-align: center;
}

.menu-sep {
  width: 1px;
  background: #1e1e1e;
  align-self: stretch;
  margin: 0.25rem 0;
  flex-shrink: 0;
}

.menu-group-btns {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

/* Base menu button */
.menu-btn {
  background: #111;
  border: 1px solid #2a2a2a;
  color: #ccc;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  font-size: 0.82rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: all 0.2s;
  min-width: 110px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.menu-btn:hover {
  background: #181818;
  transform: translateY(-1px);
}
.btn-icon { font-size: 1.1rem; line-height: 1; }
.btn-main { font-weight: bold; font-size: 0.8rem; }
.btn-sub  { font-size: 0.62rem; opacity: 0.5; font-weight: normal; letter-spacing: 0.5px; }

#randomBtn, #randomBtn2 {
  color: #00ffcc;
  border-color: #00ffcc22;
  box-shadow: 0 0 8px #00ffcc11;
}
#randomBtn:hover, #randomBtn2:hover {
  border-color: #00ffcc55;
  box-shadow: 0 0 14px #00ffcc33;
}

#randomBtnDraft {
  color: #ff8844;
  border-color: #ff884422;
  box-shadow: 0 0 8px #ff884411;
}
#randomBtnDraft:hover {
  border-color: #ff884455;
  box-shadow: 0 0 14px #ff884433;
}

#randomBtn3 {
  color: #88dd44;
  border-color: #88dd4422;
  box-shadow: 0 0 8px #88dd4411;
}
#randomBtn3:hover {
  border-color: #88dd4455;
  box-shadow: 0 0 14px #88dd4433;
}

/* Scan indicator */
.scan-indicator {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  color: #555;
}
.scan-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #00ffcc;
  box-shadow: 0 0 6px #00ffcc;
  flex-shrink: 0;
  transition: all 0.3s;
}
.scan-pip.empty {
  background: #222;
  box-shadow: none;
}
#scan-count { color: #00ffcc; font-weight: bold; }

/* ── Page Header ── */
#page-header {
  text-align: center;
  margin-bottom: 1.5rem;
}
.title-eyebrow {
  font-size: 0.65rem;
  letter-spacing: 6px;
  color: #ff4444;
  text-transform: uppercase;
  font-weight: bold;
  margin-bottom: 0.25rem;
}
#page-header h1 {
  font-size: 1.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #eee;
  margin: 0;
  font-weight: 900;
}

.card-grid {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1rem;
  max-width: 1200px;
  margin: auto;
}

.card {
  width: 220px;
  height: 165px;
  perspective: 1000px;
  margin: 8px 8px 8px 8px;
  cursor: pointer;
  opacity: 1;
  transform: translateY(20px);
  transition: all 0.4s ease;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
}

.card-front {
  background: #111;
  box-shadow: 0 0 16px #0ff;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0ff;
  font-size: 1.2rem;
}

.card-back {
  transform: rotateY(180deg);
  background: #222;
  box-shadow: 0 0 24px 6px #00ffcc;
  text-align: center;
  padding: 1rem;
}

.card-back img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  margin-bottom: 0.5rem;
}

.card-back .name {
  font-weight: bold;
  margin-top: 0.5rem;
  color: #fff;
}

.card-back .category {
  font-size: 0.9rem;
  color: #aaa;
}

.disabled {
  z-index: -1;
  opacity: 0.3
}

.disabled .card-back, .disabled .card-front {

}


/* ── Draft Mode ── */
#randomBtnDraft {
  background: linear-gradient(to right, #ff6600, #ff0080);
  color: white;
  border: none;
  padding: 0.75rem 1.5rem;
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
  margin: 10px auto;
  display: block;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px #ff660099;
}
#randomBtnDraft:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff6600cc;
}

.draft-section {
  max-width: 1000px;
  margin: 1rem auto;
}

.draft-loadout {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.75rem;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  background: #1a1a1a;
  border: 2px solid #333;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, opacity 0.4s;
}
.draft-loadout:hover {
  border-color: #ff00ff88;
  background: #222;
}
.draft-loadout.selected {
  border-color: #00ffcc;
  background: #0a2020;
  cursor: default;
}
.draft-loadout.faded {
  opacity: 0.2;
  pointer-events: none;
}

.draft-loadout-label {
  min-width: 72px;
  font-weight: bold;
  color: #888;
  font-size: 0.85rem;
  text-align: center;
}

.draft-cards {
  display: flex;
  gap: 0.5rem;
  flex: 1;
  justify-content: center;
}

.draft-card {
  width: 160px;
  height: 140px;
  perspective: 1000px;
  margin: 0;
}
.draft-card .card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}
.draft-card.flipped .card-inner {
  transform: rotateY(180deg);
}
.draft-card .card-front {
  flex-direction: column;
  gap: 0.35rem;
}
.draft-card .card-back {
  padding: 0.5rem;
}
.draft-card .card-back img {
  width: 55px;
  height: 55px;
  margin-bottom: 0.3rem;
}
.draft-card .card-back .name {
  font-size: 0.8rem;
}
.draft-card .card-back .category {
  font-size: 0.7rem;
}

.draft-type-emoji { font-size: 1.6rem; line-height: 1; }
.draft-type-label { font-size: 0.72rem; font-weight: bold; text-align: center; padding: 0 0.25rem; }

/* Type-coloured fronts */
.draft-card .card-front.type-support   { background: #10102a; box-shadow: 0 0 14px #4488ffbb; color: #88aaff; }
.draft-card .card-front.type-backpack  { background: #0a1a2a; box-shadow: 0 0 14px #00aaffbb; color: #44ccff; }
.draft-card .card-front.type-exosuit  { background: #1a1a0a; box-shadow: 0 0 14px #aaaa00bb; color: #dddd44; }
.draft-card .card-front.type-defensive { background: #0a2a0a; box-shadow: 0 0 14px #44cc44bb; color: #88ee88; }
.draft-card .card-front.type-strike    { background: #2a1010; box-shadow: 0 0 14px #ff4444bb; color: #ff8888; }

.draft-card.rerollable:hover .card-back {
  box-shadow: 0 0 28px 8px #ffaa00cc;
  cursor: pointer;
}
.draft-card.rerollable .card-back::after {
  content: "🔄 re-roll";
  position: absolute;
  bottom: 4px;
  left: 0; right: 0;
  text-align: center;
  font-size: 0.62rem;
  color: #ffaa00cc;
  opacity: 0;
  transition: opacity 0.2s;
}
.draft-card.rerollable:hover .card-back::after {
  opacity: 1;
}

/* ── Page Layout ── */
#page-layout {
  display: flex;
  align-items: flex-start;
  gap: 1.5rem;
  max-width: 1600px;
  margin: 0 auto;
}
#main-content {
  flex: 1;
  min-width: 0;
}

/* ── Callsign ── */
#callsign-bar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: #0d0d0d;
  border: 1px solid #66ffcc44;
  border-radius: 8px;
  padding: 0.45rem 0.75rem;
  margin-bottom: 0.6rem;
  cursor: pointer;
  transition: border-color 0.2s;
}
#callsign-bar:hover { border-color: #66ffccaa; }
.callsign-label {
  font-size: 1rem;
  flex-shrink: 0;
}
#callsign-display {
  flex: 1;
  font-size: 0.82rem;
  font-weight: bold;
  color: #66ffcc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-bottom: 1px dashed #66ffcc44;
}
.callsign-edit-hint {
  font-size: 0.75rem;
  opacity: 0.4;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
#callsign-bar:hover .callsign-edit-hint { opacity: 1; }
#callsign-input {
  display: none;
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid #66ffcc;
  color: #66ffcc;
  font-size: 0.82rem;
  font-weight: bold;
  outline: none;
  width: 100%;
}

/* ── Roll Log ── */
#roll-log-section {
  width: 280px;
  flex-shrink: 0;
  position: sticky;
  top: 1rem;
  max-height: calc(100vh - 2rem);
  display: flex;
  flex-direction: column;
}
#roll-log-section h2 {
  text-align: center;
  color: #66ffcc;
  font-size: 0.75rem;
  letter-spacing: 3px;
  margin: 0 0 0.5rem 0;
}
#roll-log {
  flex: 1;
  overflow-y: auto;
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  padding: 0.5rem 0.75rem;
}
.log-entry {
  padding: 0.5rem 0;
  border-bottom: 1px solid #1a1a1a;
}
.log-entry:last-child { border-bottom: none; }
.log-meta { margin-bottom: 0.35rem; }
.log-callsign { color: #66ffcc; font-size: 0.72rem; font-weight: bold; margin-right: 0.3rem; }
.log-time  { color: #444; font-size: 0.68rem; margin-right: 0.4rem; }
.log-mode  { color: #ff00ff66; font-size: 0.68rem; }
.log-icons { display: flex; flex-wrap: wrap; gap: 4px; }
.log-icon {
  width: 32px;
  height: 32px;
  object-fit: contain;
  border-radius: 4px;
  background: #1a1a1a;
  padding: 2px;
  opacity: 0.85;
  transition: opacity 0.15s;
}
.log-icon:hover { opacity: 1; }
.log-empty { color: #333; text-align: center; padding: 1.5rem; font-size: 0.82rem; }

#roll-log::-webkit-scrollbar { width: 4px; }
#roll-log::-webkit-scrollbar-track { background: transparent; }
#roll-log::-webkit-scrollbar-thumb { background: #00ffcc44; border-radius: 2px; }
#roll-log::-webkit-scrollbar-thumb:hover { background: #00ffccaa; }

/* ── Hot Right Now ── */
#hot-now {
  margin-top: 1rem;
  flex-shrink: 0;
}
#hot-now h2 {
  text-align: center;
  color: #ff6600;
  font-size: 0.75rem;
  letter-spacing: 3px;
  margin: 0 0 0.5rem 0;
}
#hot-list {
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  padding: 0.5rem 0.75rem;
}
.hot-entry {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 0;
  border-bottom: 1px solid #1a1a1a;
}
.hot-entry:last-child { border-bottom: none; }
.hot-rank {
  font-size: 0.75rem;
  font-weight: bold;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}
.hot-rank-1 { color: #ffd700; }
.hot-rank-2 { color: #aaaaaa; }
.hot-rank-3 { color: #cd7f32; }
.hot-icon {
  width: 28px;
  height: 28px;
  object-fit: contain;
  background: #1a1a1a;
  border-radius: 4px;
  padding: 2px;
  flex-shrink: 0;
}
.hot-name {
  font-size: 0.72rem;
  color: #ccc;
  flex: 1;
  line-height: 1.2;
}
.hot-count {
  font-size: 0.7rem;
  color: #ff6600aa;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="page-layout">
  <div id="main-content">

    <div id="page-header">
      <div class="title-eyebrow">Helldivers 2</div>
      <h1>Stratagem Randomizer</h1>
    </div>

    <div id="action-menu">
      <div class="menu-group">
        <div class="menu-group-label">Stratagems</div>
        <div class="menu-group-btns">
          <button id="randomBtn" class="menu-btn">
            <span class="btn-icon">🎲</span>
            <span class="btn-main">Random 4</span>
          </button>
          <button id="randomBtn2" class="menu-btn">
            <span class="btn-icon">🎲</span>
            <span class="btn-main">Random 8</span>
            <span class="btn-sub">+ Hide Rarity</span>
          </button>
        </div>
        <div class="scan-indicator">
          <span class="scan-pip" id="scan-pip"></span>
          <span>Free Scan: <span id="scan-count">1</span></span>
        </div>
      </div>

      <div class="menu-sep"></div>

      <div class="menu-group">
        <div class="menu-group-label">Challenge</div>
        <button id="randomBtnDraft" class="menu-btn">
          <span class="btn-icon">⚔️</span>
          <span class="btn-main">Draft Mode</span>
          <span class="btn-sub">Pick 1 of 3</span>
        </button>
      </div>

      <div class="menu-sep"></div>

      <div class="menu-group">
        <div class="menu-group-label">Boosters</div>
        <button id="randomBtn3" class="menu-btn">
          <span class="btn-icon">💊</span>
          <span class="btn-main">Random Boosters</span>
        </button>
      </div>
    </div>

    <div id="draft-section" class="draft-section"></div>
    <div id="stratagems" class="card-grid"></div>
    <div id="boosters" class="card-grid"></div>
  </div>

  <div id="roll-log-section">
    <div id="callsign-bar">
      <span class="callsign-label">👤</span>
      <span id="callsign-display"></span>
      <span class="callsign-edit-hint">✏️</span>
      <input id="callsign-input" type="text" maxlength="20" placeholder="Enter callsign" />
    </div>
    <h2>⚡ RECENT DROPS</h2>
    <div id="roll-log"><div class="log-empty">Loading...</div></div>
    <div id="hot-now">
      <h2>🔥 HOT RIGHT NOW</h2>
      <div id="hot-list"><div class="log-empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
// ── Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyAsIBpUDPfv4xjmIc9MwicNsbbfE9zeFso",
  authDomain: "wtk-game.firebaseapp.com",
  databaseURL: "https://wtk-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wtk-game",
  storageBucket: "wtk-game.appspot.com",
  messagingSenderId: "71061308659",
  appId: "1:71061308659:web:43897c0162aba760f6e386"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function logRoll(items, mode) {
  db.ref("rolls").push({
    names: items.map(s => s.name),
    mode,
    callsign: getCallsign(),
    ts: firebase.database.ServerValue.TIMESTAMP
  }).catch(err => console.error("Firebase write failed:", err.message));
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return "just now";
  if (m < 60) return `${m} min ago`;
  const h = Math.floor(m / 60);
  return h < 24 ? `${h} hr ago` : `${Math.floor(h/24)}d ago`;
}

function getCallsign() {
  let stored = localStorage.getItem('callsign');
  if (!stored || stored === 'Helldiver') {
    const code = Math.floor(1000 + Math.random() * 9000);
    stored = `Helldiver#${code}`;
    localStorage.setItem('callsign', stored);
  }
  return stored;
}

function initCallsign() {
  const display = document.getElementById('callsign-display');
  const input = document.getElementById('callsign-input');
  display.textContent = getCallsign();

  document.getElementById('callsign-bar').addEventListener('click', () => {
    display.style.display = 'none';
    document.querySelector('.callsign-edit-hint').style.display = 'none';
    input.style.display = 'inline';
    input.value = getCallsign();
    input.focus();
    input.select();
  });

  function save() {
    const val = input.value.trim() || getCallsign();
    localStorage.setItem('callsign', val);
    display.textContent = val;
    input.style.display = 'none';
    display.style.display = 'inline';
    document.querySelector('.callsign-edit-hint').style.display = 'inline';
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

function spinCard(frontEl, staggerDelay, onDone) {
  const totalFrames = 12;
  let frame = 0;
  function step() {
    if (frame >= totalFrames) {
      frontEl.innerHTML = 'Click to Reveal';
      onDone();
      return;
    }
    const rand = stratagems[Math.floor(Math.random() * stratagems.length)];
    frontEl.innerHTML = `<img src="${rand.icon}" style="width:55px;height:55px;object-fit:contain;opacity:0.65;filter:brightness(1.4)">`;
    const delay = 40 + (frame / totalFrames) * 160;
    frame++;
    setTimeout(step, delay);
  }
  setTimeout(step, staggerDelay);
}

function renderHotNow(entries) {
  const counts = {};
  entries.forEach(e => {
    if (!e || !e.names) return;
    const names = Array.isArray(e.names) ? e.names : Object.values(e.names);
    names.forEach(n => { counts[n] = (counts[n] || 0) + 1; });
  });

  const top3 = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3);

  const hotEl = document.getElementById("hot-list");
  if (top3.length === 0) {
    hotEl.innerHTML = '<div class="log-empty">No data yet</div>';
    return;
  }
  const medals = ["hot-rank-1", "hot-rank-2", "hot-rank-3"];
  const nums = ["1", "2", "3"];
  hotEl.innerHTML = top3.map(([name, count], i) => {
    const icon = iconMap[name] || "";
    return `<div class="hot-entry">
      <span class="hot-rank ${medals[i]}">${nums[i]}</span>
      <img src="${icon}" class="hot-icon" title="${name}" />
      <span class="hot-name">${name}</span>
      <span class="hot-count">×${count}</span>
    </div>`;
  }).join("");
}

function subscribeToLog() {
  const logEl = document.getElementById("roll-log");
  const timeout = setTimeout(() => {
    if (logEl.innerHTML.includes("Loading")) {
      logEl.innerHTML = '<div class="log-empty" style="color:#ff4444">Cannot connect to database.</div>';
      document.getElementById("hot-list").innerHTML = '<div class="log-empty" style="color:#ff4444">Cannot connect.</div>';
    }
  }, 6000);
  db.ref("rolls").orderByChild("ts").limitToLast(30)
    .on("value", snap => {
      clearTimeout(timeout);
      const entries = [];
      snap.forEach(child => { entries.push(child.val()); });
      renderHotNow(entries);
      entries.reverse();
      if (entries.length === 0) {
        logEl.innerHTML = '<div class="log-empty">No rolls yet — be the first!</div>';
        return;
      }
      logEl.innerHTML = entries.map(e => {
        if (!e || !e.names) return '';
        const namesArr = Array.isArray(e.names) ? e.names : Object.values(e.names);
        const icons = namesArr.map(n => {
          const icon = iconMap[n];
          if (!icon) return '';
          const cls = 'log-icon';
          return `<img src="${icon}" class="${cls}" title="${n}" />`;
        }).join("");
        const callsign = e.callsign || 'Helldiver';
        return `<div class="log-entry">
          <div class="log-meta">
            <span class="log-callsign">${callsign}</span>
            <span class="log-time">${timeAgo(e.ts)}</span>
            <span class="log-mode">[${e.mode}]</span>
          </div>
          <div class="log-icons">${icons}</div>
        </div>`;
      }).join("");
    }, err => {
      clearTimeout(timeout);
      logEl.innerHTML = `<div class="log-empty" style="color:#ff4444">DB error: ${err.message}</div>`;
      console.error("Firebase:", err);
    });
}

// Pick 4 unique random stratagems
function pickRandomStratagems(arr, count) {
  const result = [];
  const usedIndices = new Set();
  while (result.length < count && result.length < arr.length) {
    const i = Math.floor(Math.random() * arr.length);
    if (!usedIndices.has(i)) {
      usedIndices.add(i);
      result.push(arr[i]);
    }
  }

  const backpackCount = result.filter(_s => _s.isBackpack).length
  const supplyWeaponCount = result.filter(_s => _s.category === "Supply" && !_s.isBackpack && !_s.isVehicle).length

  // Prevent backpack + supply weapon more than 2
  if ((count <= 4) && backpackCount + supplyWeaponCount > 2) {
    return pickRandomStratagems(arr, count)
  }

  if ((count > 4) && (backpackCount > 2 || supplyWeaponCount > 2)) {
    return pickRandomStratagems(arr, count)
  }

  return result;
}

function randomBoosters(arr, count) {
  const result = [];
  const usedIndices = new Set();
  while (result.length < count && result.length < arr.length) {
    const i = Math.floor(Math.random() * arr.length);
    if (!usedIndices.has(i)) {
      usedIndices.add(i);
      result.push(arr[i]);
    }
  }

  return result;
}

function clearAllModes() {
  document.getElementById("stratagems").innerHTML = "";
  document.getElementById("boosters").innerHTML = "";
  document.getElementById("draft-section").innerHTML = "";
}

function displayStratagems(count = 4, hideRarity = false) {
  clearAllModes();
  const container = document.getElementById("stratagems");
  container.innerHTML = "";
  selectedCount = 0
  allCardDivs = []
  scanCount = count > 4 ? 1 : 0
  updateScanUI()

  const chosen = pickRandomStratagems(stratagems, count);
  logRoll(chosen, count === 8 ? "Random 8" : "Random 4");

  chosen.forEach(s => {
    let div = document.createElement("div");
    allCardDivs.push(div)
  
    if (hideRarity) 
      div.className = "stratagem weak card"
    else if (rareStratagems.includes(s.name))
      div.className = "stratagem rare card"
    else if (weakStratagems.includes(s.name))
      div.className = "stratagem weak card"
    else 
      div.className = "stratagem card"

    div.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">
          <img src="${s.icon}" alt="${s.name} Icon" />
          <div class="name">${s.name}</div>
          <div class="category">${s.category}</div>
        </div>
      </div>
    `;

    div.classList.add("spinning");
    const frontEl = div.querySelector(".card-front");
    const idx = chosen.indexOf(s);
    spinCard(frontEl, idx * 120, () => div.classList.remove("spinning"));

    // Flip on click
    div.addEventListener("click", () => {
      if (div.classList.contains("spinning")) return;
      scanCount--

      if (scanCount >= 0) {
        updateScanUI()

        div.classList.remove("weak")
        if (rareStratagems.includes(s.name))
          div.classList.add("rare")
        else if (weakStratagems.includes(s.name))
          div.classList.add("weak")
      }

      if (scanCount >= 0) {
        return false
      }

      if (div.classList.contains("flipped"))
        return false

      div.classList.add("flipped");
      selectedCount++

      div.classList.remove("weak")
      if (rareStratagems.includes(s.name))
        div.classList.add("rare")
      else if (weakStratagems.includes(s.name))
        div.classList.add("weak")

      if (selectedCount === 4 && hideRarity) {
        allCardDivs.forEach(_div => {
          if (!_div.classList.contains("flipped")) {
            _div.classList.add("flipped")
            _div.classList.add("disabled")
            _div.classList.add("weak")
          }
        })
      }
    });

    container.appendChild(div);
  });
}

function displayBoosters() {
  clearAllModes();
  const container = document.getElementById("boosters");
  container.innerHTML = "";
  allCardDivs = []

  const chosen = randomBoosters(boosters, 4);
  logRoll(chosen, "Boosters");

  chosen.forEach(s => {
    let div = document.createElement("div");
    allCardDivs.push(div)

    div.className = "stratagem card"
    div.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">
          <img src="${s.icon}" alt="${s.name} Icon" />
          <div class="name">${s.name}</div>
          <div class="category">${s.name}</div>
        </div>
      </div>
    `;

    div.classList.add("spinning");
    const frontEl = div.querySelector(".card-front");
    const idx = chosen.indexOf(s);
    spinCard(frontEl, idx * 120, () => div.classList.remove("spinning"));

    // Flip on click
    div.addEventListener("click", () => {
      if (div.classList.contains("spinning")) return;
      if (div.classList.contains("flipped"))
        return false

      div.classList.add("flipped");
    });

    container.appendChild(div);
  });
}

function getCardType(s) {
  if (s.isVehicle)                                                                  return { label: "Exosuit / Vehicle",    emoji: "🤖", cls: "type-exosuit"  };
  if (s.isBackpack)                                                                 return { label: "Backpack",             emoji: "🎒", cls: "type-backpack"  };
  if (s.category === "Offensive – Eagle" || s.category === "Offensive – Orbital")  return { label: "Strike",               emoji: "☄️", cls: "type-strike"   };
  if (s.category === "Defensive")                                                   return { label: "Sentry / Emplacement", emoji: "🗼", cls: "type-defensive" };
  return                                                                                   { label: "Support Weapon",       emoji: "🔫", cls: "type-support"  };
}

function pickDraftLoadout(arr) {
  const result = [];
  const usedIndices = new Set();
  while (result.length < 4 && result.length < arr.length) {
    const i = Math.floor(Math.random() * arr.length);
    if (usedIndices.has(i)) continue;
    const s = arr[i];
    const isStrike  = s.category === "Offensive – Eagle" || s.category === "Offensive – Orbital";
    const isSupport = s.category === "Supply" && !s.isBackpack && !s.isVehicle;
    if (isSupport && Math.random() < 0.2) continue; // 20% chance to skip support weapons
    if (!isStrike  && Math.random() < 0.2) continue; // boost strikes: 20% skip for non-strikes
    usedIndices.add(i);
    result.push(s);
  }
  const backpackCount = result.filter(s => s.isBackpack).length;
  const supportCount  = result.filter(s => s.category === "Supply" && !s.isBackpack && !s.isVehicle).length;
  if (backpackCount > 1 || supportCount > 2) return pickDraftLoadout(arr);
  return result;
}

function getSameTypePool(s) {
  const cls = getCardType(s).cls;
  return stratagems.filter(x => getCardType(x).cls === cls);
}

function buildDraftCardHTML(s) {
  const type = getCardType(s);
  return `
    <div class="card-inner">
      <div class="card-front ${type.cls}">
        <div class="draft-type-emoji">${type.emoji}</div>
        <div class="draft-type-label">${type.label}</div>
      </div>
      <div class="card-back">
        <img src="${s.icon}" alt="${s.name}" />
        <div class="name">${s.name}</div>
        <div class="category">${s.category}</div>
      </div>
    </div>
  `;
}

function displayDraftMode() {
  clearAllModes();
  const section = document.getElementById("draft-section");
  section.innerHTML = "";
  let picked = false;

  // Build all loadouts first so click handlers can reference each other
  const all = Array.from({ length: 3 }, (_, li) => {
    const loadout = pickDraftLoadout(stratagems);

    const loadoutDiv = document.createElement("div");
    loadoutDiv.className = "draft-loadout";

    const label = document.createElement("div");
    label.className = "draft-loadout-label";
    label.textContent = `Loadout ${li + 1}`;
    loadoutDiv.appendChild(label);

    const cardsDiv = document.createElement("div");
    cardsDiv.className = "draft-cards";

    const cardDivs = [];
    loadout.forEach(s => {
      const cardDiv = document.createElement("div");
      cardDiv.className = "draft-card card";
      cardDiv.innerHTML = buildDraftCardHTML(s);
      cardDivs.push(cardDiv);
      cardsDiv.appendChild(cardDiv);
    });

    loadoutDiv.appendChild(cardsDiv);
    section.appendChild(loadoutDiv);
    return { loadoutDiv, cardDivs, loadout };
  });

  // Wire up click handlers now that all loadouts exist
  all.forEach(({ loadoutDiv, cardDivs, loadout }, li) => {
    loadoutDiv.addEventListener("click", () => {
      if (picked) return;
      picked = true;

      // Reveal selected loadout
      cardDivs.forEach(c => c.classList.add("flipped"));
      loadoutDiv.classList.add("selected");
      logRoll(loadout, "Draft");

      // Reveal AND fade the others
      all.forEach((other, j) => {
        if (j !== li) {
          other.cardDivs.forEach(c => c.classList.add("flipped"));
          other.loadoutDiv.classList.add("faded");
        }
      });

      // After flip animation, enable per-card re-roll on the selected loadout
      setTimeout(() => {
        cardDivs.forEach((cardDiv, idx) => {
          cardDiv.classList.add("rerollable");
          cardDiv.addEventListener("click", (e) => {
            e.stopPropagation();
            if (cardDiv.dataset.animating === "true") return;

            const pool = getSameTypePool(loadout[idx]).filter(x => !loadout.includes(x));
            if (pool.length === 0) return;

            const newS = pool[Math.floor(Math.random() * pool.length)];
            loadout[idx] = newS;
            cardDiv.dataset.animating = "true";
            cardDiv.classList.remove("flipped");

            setTimeout(() => {
              cardDiv.innerHTML = buildDraftCardHTML(newS);
              setTimeout(() => {
                cardDiv.classList.add("flipped");
                setTimeout(() => { cardDiv.dataset.animating = "false"; }, 650);
              }, 50);
            }, 650);
          });
        });
      }, 700);
    });
  });
}

document.getElementById("randomBtn").addEventListener("click", () => displayStratagems());
document.getElementById("randomBtn2").addEventListener("click", () => displayStratagems(8, true));
document.getElementById("randomBtn3").addEventListener("click", () => displayBoosters());
document.getElementById("randomBtnDraft").addEventListener("click", displayDraftMode);

window.onload = () => {
  initCallsign();
  subscribeToLog();
};
